spring.application.name=proveedores-ms
server.port=8086

# Configuración del Datasource (JPA + Hibernate)
spring.datasource.url=jdbc:mysql://localhost:3307/db_proveedoresms?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Registro en Servidor Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
