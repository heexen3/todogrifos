spring.application.name=compras-ms
server.port=8085

# Configuracion Datasource (JPA + Hibernate)
spring.datasource.url=jdbc:mysql://localhost:3307/db_comprasms?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Registro en Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuracion de OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha