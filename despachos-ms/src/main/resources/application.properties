spring.application.name=despachos-ms
server.port=8087

# Configuracion del Datasource (JPA + Hibernate)
spring.datasource.url=jdbc:mysql://localhost:3307/db_despachosms?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Registro en Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuracion de OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
# Datos Semilla
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

