spring.application.name=despachos-ms
server.port=8087

# Configuración del Datasource (JPA + Hibernate)
spring.datasource.url=jdbc:mysql://localhost:3307/db_despachosms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Registro en Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
