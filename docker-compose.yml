  devoluciones-ms:
    build:
      context: ./devoluciones-ms
    container_name: devoluciones-ms
    ports:
      - "8091:8091"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_devolucionesms?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Frontend — Panel de Gestión TodoGrifos (nginx estático)
  # Disponible en: http://localhost:3000
  # ─────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: todogrifos-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - todogrifos-net
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  todogrifos-net:
    driver: bridge
