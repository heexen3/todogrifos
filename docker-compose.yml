services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - todogrifos-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      - eureka-server

  auth-ms:
    build:
      context: ./auth-ms
    container_name: auth-ms
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_authms?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  productos-ms:
    build:
      context: ./productos-ms
    container_name: productos-ms
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_productosms?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  clientes-ms:
    build:
      context: ./clientes-ms
    container_name: clientes-ms
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_clientesms?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ventas-ms:
    build:
      context: ./ventas-ms
    container_name: ventas-ms
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_ventasms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  compras-ms:
    build:
      context: ./compras-ms
    container_name: compras-ms
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_comprasms?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  proveedores-ms:
    build:
      context: ./proveedores-ms
    container_name: proveedores-ms
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_proveedoresms?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  despachos-ms:
    build:
      context: ./despachos-ms
    container_name: despachos-ms
    ports:
      - "8087:8087"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_despachosms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  vendedores-ms:
    build:
      context: ./vendedores-ms
    container_name: vendedores-ms
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_vendedoresms?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  inventario-ms:
    build:
      context: ./inventario-ms
    container_name: inventario-ms
    ports:
      - "8089:8089"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_inventarioms?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - todogrifos-net
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
