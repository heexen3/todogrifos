server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      server:
        webflux:
          routes:
            - id: productos-ms-route
              uri: lb://PRODUCTOS-MS
              predicates:
                - Path=/api/productos/**
            - id: inventario-ms-route
              uri: lb://INVENTARIO-MS
              predicates:
                - Path=/api/inventario/**
            - id: auth-ms-route
              uri: lb://AUTH-MS
              predicates:
                - Path=/api/auth/**
            - id: clientes-ms
              uri: lb://clientes-ms
              predicates:
                - Path=/api/clientes/**
            - id: ventas-ms
              uri: lb://ventas-ms
              predicates:
                - Path=/api/ventas/**
            - id: proveedores-ms
              uri: lb://proveedores-ms
              predicates:
                - Path=/api/proveedores/**
            - id: despachos-ms
              uri: lb://despachos-ms
              predicates:
                - Path=/api/despachos/**
            - id: vendedores-ms
              uri: lb://vendedores-ms
              predicates:
                - Path=/api/vendedores/**
            - id: devoluciones-ms
              uri: lb://devoluciones-ms
              predicates:
                - Path=/api/devoluciones/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

# opcional: es para silenciar advertencias de versiones en desarrollo
logging:
  level:
    org.springframework.cloud.gateway: INFO